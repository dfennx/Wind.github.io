<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wind · indir</title>
</head>
<body background="img/liquid.gif" style="margin:0; padding:0; background-size:cover; background-repeat:no-repeat; background-attachment:fixed; background-position:center; min-height:100vh; display:flex; align-items:center; justify-content:center;">

    <div style="width:100%; max-width:700px; padding:2rem; text-align:center; background:rgba(255,255,255,0.85); border-radius:30px; backdrop-filter:blur(5px); box-shadow:0 20px 40px rgba(0,0,0,0.2); margin:1rem;">

        <h1 style="font-size:5rem; font-weight:800; margin-bottom:3rem; color:#222;">wind</h1>

        <!-- link giriş alanı -->
        <div style="display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; justify-content:center;">
            <input type="text" style="flex:1 1 300px; padding:1rem 1.5rem; border:2px solid #ddd; border-radius:60px; font-size:1rem; outline:none; background:white;" placeholder="video veya müzik linki yapıştır...">
            <button style="padding:0.8rem 2rem; border:none; border-radius:40px; font-weight:600; font-size:1rem; cursor:pointer; background:#222; color:white;">indir</button>
        </div>

        <!-- SES / VİDEO switch -->
        <div style="display:flex; align-items:center; gap:1rem; background:white; padding:0.5rem; border-radius:60px; border:2px solid #222; margin:2rem auto; width:fit-content;" id="modeSwitch">
            <span style="padding:0.6rem 1.8rem; border-radius:40px; font-weight:600; cursor:pointer; background:#222; color:white;" onclick="switchMode('audio')" id="audioMode">🎵 Ses</span>
            <span style="padding:0.6rem 1.8rem; border-radius:40px; font-weight:600; cursor:pointer;" onclick="switchMode('video')" id="videoMode">🎬 Video</span>
        </div>

        <!-- aktif mod yazısı -->
        <div style="margin-top:1rem; font-size:1.1rem; font-weight:500; color:#222;" id="currentMode">
            Şu an: Ses indirme modu
        </div>

        <div style="margin-top:4rem; font-size:0.8rem; opacity:0.7;">
            wind · hızlı, basit, ücretsiz
        </div>

    </div>

    <script>
        function switchMode(mode) {
            const audioSpan = document.getElementById('audioMode');
            const videoSpan = document.getElementById('videoMode');
            const currentMode = document.getElementById('currentMode');
            
            if (mode === 'audio') {
                audioSpan.style.background = '#222';
                audioSpan.style.color = 'white';
                videoSpan.style.background = 'transparent';
                videoSpan.style.color = 'black';
                currentMode.textContent = 'Şu an: Ses indirme modu 🎵';
            } else {
                videoSpan.style.background = '#222';
                videoSpan.style.color = 'white';
                audioSpan.style.background = 'transparent';
                audioSpan.style.color = 'black';
                currentMode.textContent = 'Şu an: Video indirme modu 🎬';
            }
        }
    </script>

</body>
</html>
